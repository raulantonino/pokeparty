{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pokeparty{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oxanium:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    >
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <div class="app-shell">
        <header class="site-header glass-panel">
            <div>
                <p class="eyebrow">Pokédex party builder</p>
                <h1 class="site-title">Pokeparty</h1>
            </div>
            <p class="site-subtitle">Arma, ordena y optimiza tu equipo Pokémon.</p>
        </header>

        <main class="page-content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
